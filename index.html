<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="CST SYSTEM - Kasir Thai Tea CST">
    <meta name="theme-color" content="#E67E22">
    <link rel="icon" href="image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧋</text></svg>">
    <title>Kasir Thai Tea CST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK v8.10.1 Compatibility Mode -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        :root {
            --primary: #E67E22;
            --primary-dark: #D35400;
            --dark: #2C3E50;
            --success: #27AE60;
            --danger: #E74C3C;
            --warning: #F39C12;
            --light: #ECF0F1;
            --white: #ffffff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        /* Login Container */
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            padding: 40px 30px;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-logo {
            width: 100px;
            height: auto;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .login-header h1 {
            color: var(--primary);
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 5px;
        }
        
        .login-header p {
            color: #7f8c8d;
            font-size: 0.95rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
            font-size: 0.9rem;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: 0.3s;
        }
        
        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(230,126,34,0.1);
        }
        
        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }
        
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-success { background: var(--success); color: white; }
        .btn-link { background: transparent; color: var(--primary); text-decoration: underline; margin-top: 15px; }
        
        .error-message {
            background: #fadbd8;
            color: var(--danger);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9rem;
            text-align: center;
            border-left: 4px solid var(--danger);
        }
        
        .error-message.show {
            display: block;
            animation: shake 0.5s;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .divider {
            margin: 20px 0;
            text-align: center;
            position: relative;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e0e0e0;
        }
        
        .divider span {
            background: white;
            padding: 0 15px;
            color: #7f8c8d;
            font-size: 0.85rem;
            position: relative;
        }
        
        /* Custom Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            animation: modalSlide 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        @keyframes modalSlide {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .modal-logo {
            width: 80px;
            height: auto;
            margin-bottom: 15px;
        }
        
        .modal-title {
            font-size: 1.5rem;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 15px;
        }
        
        .modal-message {
            color: #555;
            margin-bottom: 25px;
            line-height: 1.6;
            font-size: 1rem;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .modal-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: 0.3s;
            flex: 1;
            min-width: 120px;
        }
        
        .modal-btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .modal-btn-primary:hover {
            background: var(--primary-dark);
        }
        
        .modal-btn-secondary {
            background: var(--light);
            color: var(--dark);
        }
        
        .modal-btn-secondary:hover {
            background: #d5dbdb;
        }
        
        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #7f8c8d;
        }
        
        .close-modal:hover {
            color: var(--danger);
        }
        
        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            
            .login-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <img src="https://i.ibb.co.com/mC3npXRW/Gemini-Generated-Image-8aemtl8aemtl8aem-removebg-preview.png" 
                 alt="Thai Tea CST" 
                 class="login-logo">
            <h1>THAI TEA CST</h1>
            <p>Sistem Kasir Digital</p>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="loginEmail"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="loginEmail" required placeholder="kasir@thaiteacst.com" autocomplete="email">
            </div>
            
            <div class="form-group">
                <label for="loginPass"><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="loginPass" required placeholder="••••••••" autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn btn-primary" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Masuk Sistem
            </button>
        </form>
        
        <div class="divider">
            <span>atau</span>
        </div>
        
        <button class="btn btn-link" onclick="openRegisterModal()">
            <i class="fas fa-user-plus"></i> Daftar Kasir Baru
        </button>
    </div>

    <!-- Custom Modal -->
    <div class="modal" id="customModal">
        <div class="modal-content" style="position: relative;">
            <button class="close-modal" onclick="closeCustomModal()">&times;</button>
            <img src="https://i.ibb.co.com/mC3npXRW/Gemini-Generated-Image-8aemtl8aemtl8aem-removebg-preview.png" 
                 alt="CST SYSTEM" 
                 class="modal-logo">
            <h2 class="modal-title">CST SYSTEM</h2>
            <p class="modal-message" id="modalMessage">Pesan</p>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-secondary" onclick="closeCustomModal()">Tutup</button>
                <button class="modal-btn modal-btn-primary" id="modalConfirmBtn">Ya</button>
            </div>
        </div>
    </div>

    <!-- Register Modal -->
    <div class="modal" id="registerModal">
        <div class="modal-content" style="position: relative; max-height: 90vh; overflow-y: auto;">
            <button class="close-modal" onclick="closeRegisterModal()">&times;</button>
            <img src="https://i.ibb.co.com/mC3npXRW/Gemini-Generated-Image-8aemtl8aemtl8aem-removebg-preview.png" 
                 alt="CST SYSTEM" 
                 class="modal-logo">
            <h2 class="modal-title">Daftar Kasir Baru</h2>
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="regName"><i class="fas fa-user"></i> Nama Lengkap</label>
                    <input type="text" id="regName" required placeholder="Masukkan nama lengkap">
                </div>
                
                <div class="form-group">
                    <label for="regEmail"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="regEmail" required placeholder="email@contoh.com">
                </div>
                
                <div class="form-group">
                    <label for="regPass"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="regPass" required minlength="6" placeholder="Minimal 6 karakter">
                </div>
                
                <div class="form-group">
                    <label for="regBranch"><i class="fas fa-store"></i> Cabang</label>
                    <select id="regBranch" required>
                        <option value="">Pilih Cabang</option>
                        <option value="cabang_01">Sport Center Bandara Soetta</option>
                        <option value="cabang_02">TOD M1, Benda</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-success" id="registerBtn">
                    <i class="fas fa-user-plus"></i> Daftar Sekarang
                </button>
            </form>
        </div>
    </div>

    <script>
        // ============================================
        // FIREBASE CONFIGURATION
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyDt5tMCf480mDGGeDd71ik...",  // <-- GANTI DENGAN API KEY ANDA
            authDomain: "thai-tea-cst-ac9db.firebaseapp.com",
            projectId: "thai-tea-cst-ac9db",
            storageBucket: "thai-tea-cst-ac9db.firebasestorage.app",
            messagingSenderId: "907107728020",
            appId: "1:907107728020:web:7340be99b3ab4c07cdd281",
            measurementId: "G-DJFC6NYVD1"
        };

        // Initialize Firebase
        let db, auth;
        let isFirebaseReady = false;
        let loginAttempts = 0;
        let lastAttemptTime = 0;
        
        try {
            firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();
            isFirebaseReady = true;
            console.log('✅ Firebase initialized');
        } catch (error) {
            console.error('❌ Firebase error:', error);
            showError('Gagal menghubungkan ke database. Silakan refresh halaman.');
        }

        // ============================================
        // ERROR HANDLING
        // ============================================
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 8000);
        }

        function checkRateLimit() {
            const now = Date.now();
            const timeDiff = now - lastAttemptTime;
            
            if (loginAttempts >= 5 && timeDiff < 300000) { // 5 attempts in 5 minutes
                const waitTime = Math.ceil((300000 - timeDiff) / 60000);
                showCustomModal(
                    'Terlalu Banyak Percobaan',
                    `Akun Anda diblokir sementara karena terlalu banyak percobaan login. Silakan tunggu ${waitTime} menit sebelum mencoba lagi.`,
                    null
                );
                return false;
            }
            
            if (timeDiff > 300000) {
                loginAttempts = 0;
            }
            
            return true;
        }

        // ============================================
        // LOGIN FUNCTION
        // ============================================
        async function handleLogin(event) {
            event.preventDefault();
            
            if (!checkRateLimit()) {
                return;
            }
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPass').value;
            const loginBtn = document.getElementById('loginBtn');
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Get user data from Firestore
                const userDoc = await db.collection('users').doc(user.uid).get();
                
                if (!userDoc.exists) {
                    throw new Error('Data user tidak ditemukan');
                }
                
                const userData = userDoc.data();
                
                // Check if user is cashier
                if (userData.role !== 'cashier' && userData.role !== 'admin' && userData.role !== 'super_admin') {
                    throw new Error('Akun ini bukan akun kasir');
                }
                
                // Store user session
                sessionStorage.setItem('currentUser', JSON.stringify({
                    uid: user.uid,
                    email: user.email,
                    name: userData.name,
                    role: userData.role,
                    branchId: userData.branchId
                }));
                
                // Redirect to kasir page
                window.location.href = 'kasir.html';
                
            } catch (error) {
                loginAttempts++;
                lastAttemptTime = Date.now();
                
                console.error('Login error:', error);
                
                let errorMessage = 'Login gagal. ';
                
                if (error.code === 'auth/too-many-requests') {
                    errorMessage = 'Terlalu banyak percobaan login. Silakan tunggu beberapa menit sebelum mencoba lagi.';
                } else if (error.code === 'auth/user-not-found') {
                    errorMessage = 'Email tidak terdaftar.';
                } else if (error.code === 'auth/wrong-password') {
                    errorMessage = 'Password salah.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Format email tidak valid.';
                } else {
                    errorMessage += error.message;
                }
                
                showError(errorMessage);
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Masuk Sistem';
            }
        }

        // ============================================
        // REGISTER FUNCTION
        // ============================================
        async function handleRegister(event) {
            event.preventDefault();
            
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPass').value;
            const branchId = document.getElementById('regBranch').value;
            const registerBtn = document.getElementById('registerBtn');
            
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Mendaftar...';
            
            try {
                // Create user in Firebase Auth
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Save user data to Firestore
                await db.collection('users').doc(user.uid).set({
                    name: name,
                    email: email,
                    role: 'cashier',
                    branchId: branchId,
                    active: true,
                    createdAt: new Date().toISOString()
                });
                
                // Delete the user from auth (admin will activate later)
                await user.delete();
                
                showCustomModal(
                    'Pendaftaran Berhasil',
                    'Akun kasir berhasil dibuat. Silakan hubungi administrator untuk aktivasi akun.',
                    () => {
                        closeRegisterModal();
                        document.getElementById('registerForm').reset();
                    }
                );
                
            } catch (error) {
                console.error('Register error:', error);
                
                let errorMessage = 'Pendaftaran gagal. ';
                
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = 'Email sudah terdaftar. Gunakan email lain.';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = 'Password terlalu lemah. Minimal 6 karakter.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Format email tidak valid.';
                } else {
                    errorMessage += error.message;
                }
                
                showCustomModal('Error', errorMessage, null);
            } finally {
                registerBtn.disabled = false;
                registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> Daftar Sekarang';
            }
        }

        // ============================================
        // MODAL FUNCTIONS
        // ============================================
        let modalCallback = null;

        function showCustomModal(title, message, callback) {
            document.querySelector('#customModal .modal-title').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            document.getElementById('customModal').classList.add('active');
            modalCallback = callback;
            
            const confirmBtn = document.getElementById('modalConfirmBtn');
            if (callback) {
                confirmBtn.style.display = 'inline-flex';
                confirmBtn.onclick = function() {
                    callback();
                    closeCustomModal();
                };
            } else {
                confirmBtn.style.display = 'none';
            }
        }

        function closeCustomModal() {
            document.getElementById('customModal').classList.remove('active');
            modalCallback = null;
        }

        function openRegisterModal() {
            document.getElementById('registerModal').classList.add('active');
        }

        function closeRegisterModal() {
            document.getElementById('registerModal').classList.remove('active');
            document.getElementById('registerForm').reset();
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('active');
            }
        }

        // Check if already logged in
        window.onload = function() {
            const savedUser = sessionStorage.getItem('currentUser');
            if (savedUser && isFirebaseReady) {
                // User already logged in, redirect to kasir
                window.location.href = 'kasir.html';
            }
        };
    </script>
</body>
</html>
