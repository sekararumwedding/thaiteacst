<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="CST SYSTEM - Kasir Thai Tea CST">
    <meta name="theme-color" content="#E67E22">
    <title>Thai Tea CST - Kasir Digital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <!-- SheetJS untuk Export Excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --primary: #E67E22;
            --primary-dark: #D35400;
            --dark: #2C3E50;
            --success: #27AE60;
            --danger: #E74C3C;
            --warning: #F39C12;
            --light: #ECF0F1;
            --white: #ffffff;
            --bg: #f5f6fa;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); padding-bottom: 80px; }
        
        .section { display: none; opacity: 0; }
        .section.active { display: block; opacity: 1; }
        
        /* Login Section */
        .login-section { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; }
        .login-container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 400px; padding: 40px 25px; text-align: center; }
        .login-logo { width: 90px; margin-bottom: 15px; }
        .login-header h1 { color: var(--primary); font-weight: 800; margin-bottom: 5px; }
        .login-header p { color: #7f8c8d; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1rem; }
        .form-group input:focus { border-color: var(--primary); outline: none; }
        .btn { padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 1rem; width: 100%; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-success { background: var(--success); color: white; }
        .btn-link { background: transparent; color: var(--primary); margin-top: 15px; text-decoration: underline; cursor: pointer; }
        .error-message { background: #fadbd8; color: var(--danger); padding: 10px; border-radius: 8px; margin-bottom: 15px; display: none; font-size: 0.85rem; text-align: center; }
        
        /* Header (Optimized Mobile) */
        .header {
            background: var(--primary);
            color: white;
            padding: 12px 15px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        
        .brand { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
        .brand-logo { width: 38px; height: 38px; background: white; border-radius: 50%; padding: 4px; flex-shrink: 0; }
        .brand-logo img { width: 100%; height: 100%; object-fit: contain; }
        .brand-text h1 { font-size: 1.05rem; font-weight: 800; line-height: 1.2; margin: 0; white-space: nowrap; }
        .brand-text p { font-size: 0.65rem; margin: 0; opacity: 0.9; }
        
        .header-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
        .action-btn {
            background: rgba(255,255,255,0.2); color: white; border: none;
            padding: 7px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: 600;
            white-space: nowrap;
        }
        .action-btn:hover { background: rgba(255,255,255,0.3); }
        .user-avatar {
            width: 32px; height: 32px; background: rgba(255,255,255,0.3);
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem;
        }
        
        /* Mobile Header Tweaks */
        @media (max-width: 480px) {
            .header { padding: 10px 12px; }
            .brand-logo { width: 34px; height: 34px; }
            .brand-text h1 { font-size: 0.95rem; }
            .action-btn { padding: 6px 10px; font-size: 0.75rem; }
        }
        
        /* Content Layout */
        .content-wrapper { max-width: 1200px; margin: 0 auto; padding: 15px; display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .content-wrapper { grid-template-columns: 2fr 1fr; } }
        
        .section-title { font-size: 1.1rem; font-weight: 700; color: var(--dark); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .section-title i { color: var(--primary); }
        
        .category-filter { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .category-filter::-webkit-scrollbar { display: none; }
        .cat-btn { padding: 8px 16px; background: white; border: 2px solid var(--light); border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 0.85rem; white-space: nowrap; }
        .cat-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 500px) { .products-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .products-grid { grid-template-columns: repeat(3, 1fr); } }
        
        .product-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: 0.3s; }
        .product-card:active { transform: scale(0.98); }
        .product-img { width: 100%; height: 110px; object-fit: cover; background: #f8f9fa; }
        .product-info { padding: 10px; }
        .product-name { font-weight: 700; color: var(--dark); font-size: 0.85rem; margin-bottom: 4px; height: 2.4em; overflow: hidden; line-height: 1.2; }
        .product-price { color: var(--primary); font-weight: 800; font-size: 0.95rem; margin-bottom: 8px; }
        .add-btn { width: 100%; padding: 8px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 0.85rem; cursor: pointer; }
        
        /* Cart Section */
        .cart-container { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: sticky; top: 80px; }
        .customer-input { background: #fff5eb; padding: 12px; border-radius: 10px; border: 2px solid var(--primary); margin-bottom: 15px; }
        .customer-input label { font-weight: 700; color: var(--primary-dark); font-size: 0.85rem; margin-bottom: 5px; display: block; }
        .customer-input input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-weight: 600; }
        
        .cart-items { max-height: 280px; overflow-y: auto; margin-bottom: 15px; }
        .cart-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid #eee; align-items: center; }
        .cart-item-info { flex: 1; }
        .cart-item-name { font-weight: 600; font-size: 0.85rem; }
        .cart-item-price { color: var(--primary); font-weight: 700; font-size: 0.85rem; }
        .cart-controls { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
        .qty-btn { width: 28px; height: 28px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .qty-btn.minus { background: var(--danger); color: white; }
        .qty-btn.plus { background: var(--primary); color: white; }
        .qty-value { font-weight: 700; font-size: 0.9rem; }
        
        .cart-summary { border-top: 2px solid #eee; padding-top: 10px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; }
        .summary-total { font-size: 1.2rem; font-weight: 800; color: var(--primary); margin-top: 10px; display: flex; justify-content: space-between; }
        .checkout-btn { width: 100%; padding: 14px; background: var(--success); color: white; border: none; border-radius: 10px; font-weight: 700; font-size: 1rem; margin-top: 15px; cursor: pointer; }
        
        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 15px; width: 100%; max-width: 500px; padding: 25px; text-align: center; position: relative; max-height: 90vh; overflow-y: auto; }
        .modal-logo { width: 80px; margin-bottom: 15px; }
        .modal-title { font-size: 1.4rem; color: var(--primary); font-weight: 700; margin-bottom: 10px; }
        .modal-message { color: #555; margin-bottom: 20px; line-height: 1.5; }
        .modal-buttons { display: flex; gap: 10px; justify-content: center; }
        .modal-btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; flex: 1; }
        .modal-btn-primary { background: var(--primary); color: white; }
        .modal-btn-secondary { background: var(--light); color: var(--dark); }
        .close-modal { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        
        /* Report Table */
        .report-filter { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }
        .report-filter select { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; }
        .report-table-container { overflow-x: auto; margin-bottom: 15px; max-height: 300px; }
        .report-table { width: 100%; border-collapse: collapse; min-width: 400px; }
        .report-table th, .report-table td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.85rem; }
        .report-table th { background: #f8f9fa; font-weight: 600; }
        
        .loading { text-align: center; padding: 20px; color: #7f8c8d; }
        .spinner { border: 3px solid var(--light); border-top: 3px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Login Section -->
    <div id="loginSection" class="section active">
        <div class="login-section">
            <div class="login-container">
                <img src="https://i.ibb.co.com/mC3npXRW/Gemini-Generated-Image-8aemtl8aemtl8aem-removebg-preview.png" class="login-logo" alt="Logo">
                <div class="login-header">
                    <h1>THAI TEA CST</h1>
                    <p>Sistem Kasir Digital</p>
                </div>
                <div id="loginError" class="error-message"></div>
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group"><label>Email</label><input type="email" id="loginEmail" required placeholder="kasir@thaiteacst.com"></div>
                    <div class="form-group"><label>Password</label><input type="password" id="loginPass" required placeholder="••••••••"></div>
                    <button type="submit" class="btn btn-primary">Masuk Sistem</button>
                </form>
                <button class="btn btn-link" onclick="openRegisterModal()">Daftar Kasir Baru</button>
            </div>
        </div>
    </div>

    <!-- Kasir Section -->
    <div id="kasirSection" class="section">
        <div class="header">
            <div class="brand">
                <div class="brand-logo"><img src="https://i.ibb.co.com/mC3npXRW/Gemini-Generated-Image-8aemtl8aemtl8aem-removebg-preview.png" alt="Logo"></div>
                <div class="brand-text">
                    <h1>THAI TEA CST</h1>
                    <p>Point of Sale</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="action-btn" onclick="openReportModal()"><i class="fas fa-chart-bar"></i> Laporan</button>
                <div class="user-avatar" id="userAvatar">U</div>
                <button class="action-btn" onclick="confirmLogout()" style="background:var(--danger);"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>

        <div class="content-wrapper">
            <div class="menu-side">
                <div class="section-title"><i class="fas fa-mug-hot"></i> Menu</div>
                <div class="category-filter">
                    <button class="cat-btn active" onclick="filterCategory('all')">Semua</button>
                    <button class="cat-btn" onclick="filterCategory('premium')">Premium</button>
                    <button class="cat-btn" onclick="filterCategory('original')">Original</button>
                    <button class="cat-btn" onclick="filterCategory('topping')">Topping</button>
                </div>
                <div id="loadingContainer" class="loading"><div class="spinner"></div>Memuat Menu...</div>
                <div class="products-grid" id="productsGrid" style="display: none;"></div>
            </div>

            <div class="cart-container">
                <div class="section-title"><i class="fas fa-shopping-cart"></i> Keranjang</div>
                <div class="customer-input">
                    <label><i class="fas fa-user"></i> Nama Pembeli</label>
                    <input type="text" id="customerName" placeholder="Masukkan nama pembeli (wajib)">
                </div>
                <div class="cart-items" id="cartItems">
                    <div style="text-align:center; padding:30px; color:#bdc3c7;"><i class="fas fa-basket-shopping" style="font-size:3rem; margin-bottom:10px;"></i><p>Keranjang kosong</p></div>
                </div>
                <div class="cart-summary">
                    <div class="summary-row"><span>Subtotal</span><span id="subtotal">Rp 0</span></div>
                    <div class="summary-row"><span>Diskon</span><input type="number" id="discount" value="0" style="width:80px; text-align:right; border:1px solid #ddd; border-radius:5px; padding:4px;" oninput="calcTotal()"></div>
                    <div class="summary-total"><span>Total</span><span id="total">Rp 0</span></div>
                </div>
                <button class="checkout-btn" onclick="checkout()"><i class="fas fa-check-circle"></i> Bayar Sekarang</button>
            </div>
        </div>
    </div>

    <!-- Report Modal -->
    <div class="modal" id="reportModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeReportModal()">&times;</button>
            <div class="modal-title"><i class="fas fa-chart-pie"></i> Laporan Penjualan</div>
            
            <div class="report-filter">
                <select id="branchFilter" onchange="loadReports()">
                    <option value="all">Semua Cabang</option>
                    <option value="cabang_01">Sport Center Bandara Soetta</option>
                    <option value="cabang_02">TOD M1, Benda</option>
                </select>
            </div>
            
            <div id="reportLoading" class="loading"><div class="spinner"></div>Memuat Data...</div>
            <div id="reportContent" style="display:none;">
                <div class="report-table-container">
                    <table class="report-table">
                        <thead><tr><th>Tgl</th><th>Items</th><th>Total</th><th>Bayar</th></tr></thead>
                        <tbody id="reportTableBody"></tbody>
                    </table>
                </div>
                <button class="btn btn-success" onclick="downloadExcel()"><i class="fas fa-file-excel"></i> Download Excel</button>
            </div>
        </div>
    </div>

    <!-- Register Modal -->
    <div class="modal" id="registerModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeRegisterModal()">&times;</button>
            <div class="modal-title">Daftar Kasir Baru</div>
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group"><input type="text" id="regName" required placeholder="Nama Lengkap"></div>
                <div class="form-group"><input type="email" id="regEmail" required placeholder="Email"></div>
                <div class="form-group"><input type="password" id="regPass" required minlength="6" placeholder="Password (Min 6 karakter)"></div>
                <div class="form-group">
                    <select id="regBranch" required>
                        <option value="">Pilih Cabang</option>
                        <option value="cabang_01">Sport Center Bandara Soetta</option>
                        <option value="cabang_02">TOD M1, Benda</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-success">Daftar</button>
            </form>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeCustomModal()">&times;</button>
            <img src="https://i.ibb.co.com/mC3npXRW/Gemini-Generated-Image-8aemtl8aemtl8aem-removebg-preview.png" class="modal-logo">
            <div class="modal-title" id="modalTitle">CST SYSTEM</div>
            <div class="modal-message" id="modalMessage"></div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-secondary" onclick="closeCustomModal()">Tutup</button>
                <button class="modal-btn modal-btn-primary" id="modalBtnOk">OK</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // FIREBASE CONFIG
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyAWuzMWsOycxq0gjNm5rP3hDVOKuYuKLvA",  // <-- ISI API KEY ANDA
            authDomain: "thai-tea-cst-ac9db.firebaseapp.com",
            projectId: "thai-tea-cst-ac9db",
            storageBucket: "thai-tea-cst-ac9db.firebasestorage.app",
            messagingSenderId: "907107728020",
            appId: "1:907107728020:web:7340be99b3ab4c07cdd281",
            measurementId: "G-DJFC6NYVD1"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let currentBranch = null;
        let products = [];
        let cart = [];
        let lastTransaction = null;
        let transactionsData = [];

        const branchNames = { cabang_01: 'Soetta', cabang_02: 'TOD M1' };
        const formatRp = n => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n || 0);
        
        const defaultProducts = [
            { id: 'prem_thai', name: 'Premium Thai Tea', cat: 'premium', price: 20000, img: 'https://i.ibb.co.com/S44X01hn/Premium-Thai-Tea-with-Cream-Cheese-Shredded-Cheese.jpg' },
            { id: 'prem_matcha', name: 'Premium Matcha', cat: 'premium', price: 25000, img: 'https://i.ibb.co.com/XZ2k5y1T/Premium-Matcha-with-Cream-Cheese-Shredded-Cheese.jpg' },
            { id: 'prem_choco', name: 'Premium Chocolate', cat: 'premium', price: 20000, img: 'https://i.ibb.co.com/ZzSGpkQB/Premium-Chocolate-with-Cream-Cheese-Shredded-Cheese.jpg' },
            { id: 'orig_thai', name: 'Thai Tea', cat: 'original', price: 10000, img: 'https://i.ibb.co.com/N6jCd6sw/Thai-Tea-original.jpg' },
            { id: 'orig_matcha', name: 'Matcha', cat: 'original', price: 10000, img: 'https://i.ibb.co.com/99Tb8ZjY/Matcha-original.jpg' },
            { id: 'orig_choco', name: 'Chocolate', cat: 'original', price: 10000, img: 'https://i.ibb.co.com/bjzr6NNm/Chocolate-original.jpg' },
            { id: 'top_cream', name: 'Cream Cheese', cat: 'topping', price: 3000, img: 'https://i.ibb.co.com/SXyM8m2L/Extra-Topping-Cream-Cheese.jpg' },
            { id: 'top_cheese', name: 'Cheese Parut', cat: 'topping', price: 3000, img: 'https://i.ibb.co.com/gZv3pDvz/Extra-Topping-Cheese-Keju-Parut.jpg' },
            { id: 'top_bubble', name: 'Bubble', cat: 'topping', price: 3000, img: 'https://i.ibb.co.com/d0DwHSr4/Extra-Topping-Bubble-Tapioca-Pearl.jpg' }
        ];

        // ============================================
        // INITIALIZATION
        // ============================================
        window.onload = function() {
            showLoginSection();
            const savedUser = sessionStorage.getItem('currentUser');
            if (savedUser) {
                const userData = JSON.parse(savedUser);
                if (userData.uid) {
                    currentUser = userData;
                    currentBranch = userData.branchId;
                    showKasirSection();
                    loadProducts();
                }
            }
        };

        function showLoginSection() { document.getElementById('loginSection').classList.add('active'); document.getElementById('kasirSection').classList.remove('active'); }
        function showKasirSection() { 
            document.getElementById('loginSection').classList.remove('active'); 
            document.getElementById('kasirSection').classList.add('active'); 
            if(currentUser) document.getElementById('userAvatar').textContent = currentUser.name ? currentUser.name.charAt(0).toUpperCase() : 'U';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            try {
                const res = await auth.signInWithEmailAndPassword(email, pass);
                const userDoc = await db.collection('users').doc(res.user.uid).get();
                if (!userDoc.exists) throw new Error('User tidak ditemukan');
                const data = userDoc.data();
                currentUser = { uid: res.user.uid, name: data.name, branchId: data.branchId };
                currentBranch = data.branchId;
                sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
                showKasirSection();
                loadProducts();
            } catch (err) {
                document.getElementById('loginError').textContent = err.message;
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function confirmLogout() { if(confirm('Yakin ingin logout?')) { auth.signOut(); sessionStorage.removeItem('currentUser'); showLoginSection(); } }

        // ============================================
        // PRODUCTS & CART
        // ============================================
        async function loadProducts() {
            try {
                const snap = await db.collection('products').get();
                if (!snap.empty) { products = []; snap.forEach(d => products.push({ id: d.id, ...d.data() })); } 
                else { products = defaultProducts; }
                document.getElementById('loadingContainer').style.display = 'none';
                document.getElementById('productsGrid').style.display = 'grid';
                renderProducts('all');
            } catch (e) { products = defaultProducts; document.getElementById('loadingContainer').style.display = 'none'; document.getElementById('productsGrid').style.display = 'grid'; renderProducts('all'); }
        }

        function renderProducts(cat) {
            const grid = document.getElementById('productsGrid');
            const list = cat === 'all' ? products : products.filter(p => p.cat === cat);
            grid.innerHTML = list.map(p => `
                <div class="product-card">
                    <img src="${p.img}" class="product-img" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23f8f9fa%22 width=%22100%22 height=%22100%22/><text y=%22.9em%22 font-size=%2280%22 x=%2250%22 text-anchor=%22middle%22>🧋</text></svg>'">
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${formatRp(p.price)}</div>
                        <button class="add-btn" onclick="addToCart('${p.id}')">Tambah</button>
                    </div>
                </div>
            `).join('');
        }

        function filterCategory(cat) { document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); renderProducts(cat); }
        function addToCart(id) { const prod = products.find(p => p.id === id); const exist = cart.find(c => c.id === id); if (exist) exist.qty++; else cart.push({ ...prod, qty: 1 }); renderCart(); }
        function renderCart() {
            const container = document.getElementById('cartItems');
            if (cart.length === 0) container.innerHTML = '<div style="text-align:center; padding:30px; color:#bdc3c7;"><i class="fas fa-basket-shopping" style="font-size:3rem; margin-bottom:10px;"></i><p>Keranjang kosong</p></div>';
            else container.innerHTML = cart.map((item, i) => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-price">${formatRp(item.price)}</div>
                        <div class="cart-controls">
                            <button class="qty-btn minus" onclick="updateQty(${i}, -1)">-</button>
                            <span class="qty-value">${item.qty}</span>
                            <button class="qty-btn plus" onclick="updateQty(${i}, 1)">+</button>
                        </div>
                    </div>
                </div>
            `).join('');
            calcTotal();
        }
        function updateQty(i, delta) { cart[i].qty += delta; if (cart[i].qty <= 0) cart.splice(i, 1); renderCart(); }
        function calcTotal() { const sub = cart.reduce((s, i) => s + (i.price * i.qty), 0); const disc = parseInt(document.getElementById('discount').value) || 0; document.getElementById('subtotal').textContent = formatRp(sub); document.getElementById('total').textContent = formatRp(Math.max(0, sub - disc)); }

        // ============================================
        // CHECKOUT & PRINT (FIXED ALIGNMENT)
        // ============================================
        async function checkout() {
            const name = document.getElementById('customerName').value.trim();
            if (!name) { alert('Nama Pembeli wajib diisi!'); return; }
            if (cart.length === 0) return;

            const sub = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const disc = parseInt(document.getElementById('discount').value) || 0;
            const total = Math.max(0, sub - disc);

            try {
                const docRef = await db.collection('transactions').add({
                    items: cart, subtotal: sub, discount: disc, total: total,
                    customerName: name, cashierId: currentUser.uid, cashierName: currentUser.name,
                    branchId: currentBranch, timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                lastTransaction = { id: docRef.id, items: cart, total: total, customerName: name };
                printStruk();
                cart = []; document.getElementById('customerName').value = ''; renderCart();
                alert('Transaksi Berhasil!');
            } catch (e) { alert('Gagal: ' + e.message); }
        }

        function printStruk() {
            if (!lastTransaction) return;
            const date = new Date();
            const dateStr = date.toLocaleDateString('id-ID') + ' ' + date.toLocaleTimeString('id-ID');
            
            // Format fixed-width for thermal (32 chars wide)
            let text = '       THAI TEA CST\n';
            text += '--------------------------------\n';
            text += `${lastTransaction.customerName}\n`;
            text += `${dateStr}\n`;
            text += '--------------------------------\n';
            
            lastTransaction.items.forEach(item => {
                const name = item.name.length > 18 ? item.name.substring(0, 15) + '...' : item.name;
                const price = formatRp(item.price * item.qty);
                const qtyLine = `${item.qty}x ${formatRp(item.price)}`;
                // Align name left, price right
                text += `${name.padEnd(18)}${price.padStart(12)}\n`;
                text += `  ${qtyLine}\n\n`;
            });
            
            text += '--------------------------------\n';
            text += `TOTAL: ${formatRp(lastTransaction.total).padStart(30)}\n`;
            text += '--------------------------------\n\n';
            text += 'Pesanan Kembali: +62 822-9999-7227\n';
            text += '   Terima Kasih!\n';
            
            const cleanText = text.replace(/[^\x00-\x7F]/g, '').trim();
            const b64 = btoa(cleanText);
            
            if (/Android/i.test(navigator.userAgent)) {
                window.location.href = `rawbt:base64,${b64}`;
                setTimeout(() => { if(!document.hidden) alert('Jika printer tidak merespon, pastikan aplikasi RawBT sudah terinstall.'); }, 2000);
            }
        }

        // ============================================
        // REPORTS & EXCEL (BRANCH FILTER ADDED)
        // ============================================
        function openReportModal() {
            document.getElementById('reportModal').classList.add('active');
            document.getElementById('branchFilter').value = currentBranch; // Default to current branch
            document.getElementById('reportLoading').style.display = 'block';
            document.getElementById('reportContent').style.display = 'none';
            loadReports();
        }

        function closeReportModal() { document.getElementById('reportModal').classList.remove('active'); }

        async function loadReports() {
            const selectedBranch = document.getElementById('branchFilter').value;
            document.getElementById('reportLoading').style.display = 'block';
            document.getElementById('reportContent').style.display = 'none';
            
            try {
                let query = db.collection('transactions').orderBy('timestamp', 'desc').limit(100);
                if (selectedBranch !== 'all') query = query.where('branchId', '==', selectedBranch);
                
                const snap = await query.get();
                transactionsData = [];
                const tbody = document.getElementById('reportTableBody');
                tbody.innerHTML = '';
                
                snap.forEach(doc => {
                    const d = doc.data();
                    const tDate = d.timestamp ? d.timestamp.toDate() : new Date();
                    const branchLabel = branchNames[d.branchId] || d.branchId;
                    const row = {
                        tanggal: tDate.toLocaleDateString('id-ID'),
                        cabang: branchLabel,
                        items: d.items.map(i => `${i.name} x${i.qty}`).join(', '),
                        total: d.total,
                        bayar: d.paymentMethod || 'Cash',
                        customer: d.customerName || '-'
                    };
                    transactionsData.push(row);
                    
                    tbody.innerHTML += `<tr><td>${row.tanggal}</td><td>${row.items}</td><td><b>${formatRp(row.total)}</b></td><td>${row.bayar}</td></tr>`;
                });
                
                document.getElementById('reportLoading').style.display = 'none';
                document.getElementById('reportContent').style.display = 'block';
            } catch (e) {
                console.error(e);
                document.getElementById('reportLoading').textContent = 'Gagal memuat data. Periksa koneksi.';
            }
        }

        function downloadExcel() {
            if(transactionsData.length === 0) { alert('Tidak ada data'); return; }
            const branch = document.getElementById('branchFilter').value;
            const ws = XLSX.utils.json_to_sheet(transactionsData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Laporan");
            XLSX.writeFile(wb, `Laporan_Penjualan_${branch !== 'all' ? branch : 'Semua'}_${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        // ============================================
        // REGISTRATION
        // ============================================
        function openRegisterModal() { document.getElementById('registerModal').classList.add('active'); }
        function closeRegisterModal() { document.getElementById('registerModal').classList.remove('active'); }
        async function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            const branch = document.getElementById('regBranch').value;
            try {
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                await db.collection('users').doc(res.user.uid).set({ name, email, branchId: branch, role: 'cashier' });
                await auth.signOut();
                alert('Pendaftaran berhasil! Silakan login.');
                closeRegisterModal();
            } catch (err) { alert('Gagal: ' + err.message); }
        }
        function closeCustomModal() { document.getElementById('confirmModal').classList.remove('active'); }
    </script>
</body>
