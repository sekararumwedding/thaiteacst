<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin - Thai Tea CST</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>
</head>
<body>
    <h1>Admin Dashboard</h1>
    <div id="loginForm">
        <input type="email" id="email" placeholder="Email admin"><br>
        <input type="password" id="pass" placeholder="Password"><br>
        <button onclick="login()">Login</button>
        <p id="error" style="color:red"></p>
    </div>
    <div id="content" style="display:none">
        <h2>Selamat datang, <span id="userName"></span>!</h2>
        <button onclick="logout()">Logout</button>
        <h3>Tambah Kasir</h3>
        <input type="text" id="nama" placeholder="Nama"><br>
        <input type="email" id="emailKasir" placeholder="Email"><br>
        <input type="password" id="passKasir" placeholder="Password"><br>
        <button onclick="addKasir()">Simpan</button>
    </div>

    <script>
        let auth, db;
        
        window.onload = async function() {
            await new Promise(r => setTimeout(r, 2000));
            auth = window.auth;
            db = window.db;
            
            auth.onAuthStateChanged(async user => {
                if(user) {
                    const doc = await db.collection('users').doc(user.uid).get();
                    const data = doc.data();
                    if(data && data.role === 'admin') {
                        document.getElementById('loginForm').style.display = 'none';
                        document.getElementById('content').style.display = 'block';
                        document.getElementById('userName').textContent = data.name;
                    } else {
                        document.getElementById('error').textContent = 'Bukan admin!';
                    }
                }
            });
        };

        async function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                await auth.signInWithEmailAndPassword(email, pass);
            } catch(e) {
                document.getElementById('error').textContent = e.message;
            }
        }

        async function addKasir() {
            const nama = document.getElementById('nama').value;
            const email = document.getElementById('emailKasir').value;
            const pass = document.getElementById('passKasir').value;
            
            const cred = await auth.createUserWithEmailAndPassword(email, pass);
            await db.collection('users').doc(cred.user.uid).set({
                name: nama,
                email: email,
                role: 'cashier',
                branchId: 'cabang_01',
                active: true
            });
            await cred.user.delete();
            alert('Kasir berhasil ditambahkan!');
        }

        function logout() {
            auth.signOut();
            location.reload();
        }
    </script>
</body>
</html>
