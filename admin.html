<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Thai Tea CST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        /* Gunakan style yang sama seperti admin.html sebelumnya, tambah: */
        .tab-nav { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: none; cursor: pointer; font-weight: 600; color: var(--gray); border-radius: 8px; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: white; padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 20px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔐 Admin Dashboard</h1>
            <button onclick="logout()">Keluar</button>
        </header>
        
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('dashboard')">📊 Dashboard</button>
            <button class="tab-btn" onclick="switchTab('users')">👥 Kelola Kasir</button>
            <button class="tab-btn" onclick="switchTab('inventory')">📦 Manajemen Stok</button>
            <button class="tab-btn" onclick="switchTab('transactions')">🧾 Transaksi</button>
        </div>
        
        <!-- TAB: DASHBOARD -->
        <div id="tab-dashboard" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card"><h3>Total Pendapatan</h3><p id="dashRevenue">Rp 0</p></div>
                <div class="stat-card"><h3>Total Transaksi</h3><p id="dashOrders">0</p></div>
                <div class="stat-card"><h3>Total Kasir Aktif</h3><p id="dashCashiers">0</p></div>
                <div class="stat-card"><h3>Produk Stok Tipis</h3><p id="dashLowStock">0</p></div>
            </div>
        </div>
        
        <!-- TAB: USER MANAGEMENT -->
        <div id="tab-users" class="tab-content">
            <div class="card">
                <h3><i class="fas fa-user-plus"></i> Tambah Kasir Baru</h3>
                <div class="form-row">
                    <input type="text" id="newUserName" placeholder="Nama Lengkap">
                    <input type="email" id="newUserEmail" placeholder="Email">
                    <input type="password" id="newUserPass" placeholder="Password">
                    <select id="newUserBranch">
                        <option value="cabang_01">Sport Center Bandara</option>
                        <option value="cabang_02">TOD M1, Benda</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="createCashier()" style="margin-top: 15px;">
                    <i class="fas fa-save"></i> Simpan Kasir
                </button>
            </div>
            
            <div class="card">
                <h3>Daftar Kasir</h3>
                <table id="usersTable">
                    <thead><tr><th>Nama</th><th>Email</th><th>Cabang</th><th>Status</th><th>Aksi</th></tr></thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
        </div>
        
        <!-- TAB: INVENTORY -->
        <div id="tab-inventory" class="tab-content">
            <div class="card">
                <h3><i class="fas fa-boxes"></i> Stok Inventory per Cabang</h3>
                <select id="inventoryBranch" onchange="loadInventory()">
                    <option value="cabang_01">Sport Center Bandara</option>
                    <option value="cabang_02">TOD M1, Benda</option>
                </select>
                <table id="inventoryTable" style="margin-top: 15px;">
                    <thead><tr><th>Produk</th><th>Stok</th><th>Min. Stok</th><th>Status</th><th>Aksi</th></tr></thead>
                    <tbody id="inventoryTableBody"></tbody>
                </table>
            </div>
        </div>
        
        <!-- TAB: TRANSACTIONS (sama seperti sebelumnya) -->
        <div id="tab-transactions" class="tab-content">
            <!-- Copy dari admin.html sebelumnya -->
        </div>
    </div>

    <script>
        // Firebase Config (sama)
        const firebaseConfig = { /* ... sama ... */ };
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // Tab Switching
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active');
            event.target.classList.add('active');
            
            if(tabName === 'users') loadUsers();
            if(tabName === 'inventory') loadInventory();
            if(tabName === 'dashboard') loadDashboard();
        }
        
        // CREATE CASHIER
        async function createCashier() {
            const name = document.getElementById('newUserName').value;
            const email = document.getElementById('newUserEmail').value;
            const pass = document.getElementById('newUserPass').value;
            const branch = document.getElementById('newUserBranch').value;
            
            if(!name || !email || !pass) { alert('Semua field harus diisi!'); return; }
            
            try {
                // 1. Create Auth User
                const cred = await auth.createUserWithEmailAndPassword(email, pass);
                
                // 2. Save to Firestore
                await db.collection('users').doc(cred.user.uid).set({
                    name: name,
                    email: email,
                    role: 'cashier',
                    branchId: branch,
                    active: true,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                alert('✅ Kasir berhasil dibuat!');
                document.getElementById('newUserName').value = '';
                document.getElementById('newUserEmail').value = '';
                document.getElementById('newUserPass').value = '';
                loadUsers();
                
            } catch(error) {
                alert('Error: ' + error.message);
            }
        }
        
        // LOAD USERS
        async function loadUsers() {
            const snap = await db.collection('users').where('role', '==', 'cashier').get();
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';
            
            snap.forEach(doc => {
                const u = doc.data();
                const branchName = u.branchId === 'cabang_01' ? 'Sport Center' : 'TOD M1';
                tbody.innerHTML += `
                    <tr>
                        <td>${u.name}</td>
                        <td>${u.email}</td>
                        <td>${branchName}</td>
                        <td>${u.active ? '<span style="color:green">● Aktif</span>' : '<span style="color:red">● Nonaktif</span>'}</td>
                        <td>
                            <button onclick="toggleUser('${doc.id}', ${!u.active})" class="btn btn-sm">
                                ${u.active ? 'Nonaktifkan' : 'Aktifkan'}
                            </button>
                            <button onclick="deleteUser('${doc.id}')" class="btn btn-sm btn-danger">Hapus</button>
                        </td>
                    </tr>
                `;
            });
        }
        
        // TOGGLE USER STATUS
        async function toggleUser(uid, newStatus) {
            await db.collection('users').doc(uid).update({ active: newStatus });
            loadUsers();
        }
        
        // DELETE USER
        async function deleteUser(uid) {
            if(confirm('Hapus kasir ini?')) {
                await db.collection('users').doc(uid).delete();
                await auth.currentUser.delete(); // Optional: hapus dari auth juga
                loadUsers();
            }
        }
        
        // INVENTORY MANAGEMENT
        async function loadInventory() {
            const branch = document.getElementById('inventoryBranch').value;
            const snap = await db.collection('inventory').where('branchId', '==', branch).get();
            const tbody = document.getElementById('inventoryTableBody');
            tbody.innerHTML = '';
            
            snap.forEach(doc => {
                const inv = doc.data();
                const status = inv.stock <= inv.minStock ? 
                    '<span style="color:red; font-weight:bold">⚠️ Stok Tipis</span>' : 
                    '<span style="color:green">✓ Aman</span>';
                
                tbody.innerHTML += `
                    <tr>
                        <td>${inv.productName}</td>
                        <td><input type="number" value="${inv.stock}" onchange="updateStock('${doc.id}', this.value)" style="width:80px; padding:5px;"></td>
                        <td>${inv.minStock}</td>
                        <td>${status}</td>
                        <td><button onclick="addStock('${doc.id}')" class="btn btn-sm">+ Tambah</button></td>
                    </tr>
                `;
            });
        }
        
        async function updateStock(docId, newStock) {
            await db.collection('inventory').doc(docId).update({ stock: parseInt(newStock) });
            loadInventory();
        }
        
        // CHECKOUT DENGAN STOCK DEDUCTION
        async function checkoutWithStock(cart, branchId) {
            const batch = db.batch();
            
            // 1. Kurangi stok untuk setiap item
            for(const item of cart) {
                const invRef = db.collection('inventory')
                    .where('productId', '==', item.id)
                    .where('branchId', '==', branchId)
                    .limit(1);
                
                const snap = await invRef.get();
                if(snap.empty) throw new Error(`Stok tidak ditemukan untuk ${item.name}`);
                
                const invDoc = snap.docs[0];
                const invData = invDoc.data();
                
                if(invData.stock < item.quantity) {
                    throw new Error(`Stok ${item.name} tidak cukup! Tersedia: ${invData.stock}`);
                }
                
                batch.update(invDoc.ref, { 
                    stock: firebase.firestore.FieldValue.increment(-item.quantity),
                    lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            
            // 2. Simpan transaksi
            const trxRef = db.collection('transactions').doc();
            batch.set(trxRef, {
                items: cart,
                branchId: branchId,
                cashierId: currentUser.uid,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                // ... field lainnya
            });
            
            await batch.commit();
            return true;
        }
    </script>
</body>
</html>
